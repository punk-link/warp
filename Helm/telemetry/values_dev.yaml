# Development environment values for Warp Telemetry Stack

namespace: observability

# OTEL Collector
otelCollector:
  enabled: true
  name: otel-collector
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.144.0"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ports:
    grpc: 4317
    http: 4318
    metrics: 8889

# VictoriaLogs
victoriaLogs:
  enabled: true
  name: victorialogs
  image:
    repository: victoriametrics/victoria-logs
    tag: "v1.49.0"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ports:
    http: 9428
  storage:
    size: 10Gi
    storageClassName: "local-path"
  retention:
    period: 7d

# VictoriaTraces
victoriaTraces:
  enabled: true
  name: victoriatraces
  image:
    repository: victoriametrics/victoria-traces
    tag: "v0.8.0"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ports:
    http: 10428
    otlpGrpc: 4317
  storage:
    size: 10Gi
    storageClassName: "local-path"
  retention:
    period: 7d

# VictoriaMetrics
victoriaMetrics:
  enabled: true
  name: victoriametrics
  image:
    repository: victoriametrics/victoria-metrics
    tag: "v1.119.0"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  ports:
    http: 8428
  storage:
    size: 20Gi
    storageClassName: "local-path"
  retention:
    period: 7d
  scrapeInterval: 15s

# Grafana
grafana:
  enabled: true
  name: grafana
  image:
    repository: grafana/grafana
    tag: "12.3"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ports:
    http: 3000
  storage:
    size: 1Gi
    storageClassName: "local-path"
  auth:
    anonymousEnabled: true
    anonymousOrgRole: Admin
    disableLoginForm: true
  ingress:
    enabled: false
    className: nginx
    host: grafana-dev.example.com
    tls:
      enabled: false
      secretName: grafana-tls
