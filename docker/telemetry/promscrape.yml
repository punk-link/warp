global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'victoriametrics'
    static_configs:
      - targets: ['localhost:8428']

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'victoriatraces'
    static_configs:
      - targets: ['victoriatraces:10428']

  - job_name: 'victorialogs'
    static_configs:
      - targets: ['victorialogs:9428']
