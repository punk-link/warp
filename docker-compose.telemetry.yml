services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.144.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./docker/telemetry/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    networks:
      - warp-network
    restart: unless-stopped

  victorialogs:
    image: victoriametrics/victoria-logs:v1.49.0
    command:
      - -storageDataPath=/victoria-logs-data
      - -retentionPeriod=7d
      - -httpListenAddr=:9428
    volumes:
      - victorialogs-data:/victoria-logs-data
    ports:
      - "9428:9428"
    networks:
      - warp-network
    restart: unless-stopped

  victoriatraces:
    image: victoriametrics/victoria-traces:v0.8.0
    command:
      - -storageDataPath=/victoria-traces-data
      - -retentionPeriod=7d
      - -httpListenAddr=:10428
      - -otlpGRPCListenAddr=:4317
      - -otlpGRPC.tls=false
      - -servicegraph.enableTask=true
    volumes:
      - victoriatraces-data:/victoria-traces-data
    ports:
      - "10428:10428"
    networks:
      - warp-network
    restart: unless-stopped

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.119.0
    command:
      - -storageDataPath=/victoria-metrics-data
      - -retentionPeriod=7d
      - -promscrape.config=/etc/victoria-metrics/promscrape.yml
      - -httpListenAddr=:8428
    volumes:
      - ./docker/telemetry/promscrape.yml:/etc/victoria-metrics/promscrape.yml
      - victoriametrics-data:/victoria-metrics-data
    ports:
      - "8428:8428"
    networks:
      - warp-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.3
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_PLUGINS_PREINSTALL_SYNC=victoriametrics-logs-datasource
    volumes:
      - ./docker/telemetry/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - warp-network
    restart: unless-stopped
    depends_on:
      - victoriametrics
      - victorialogs
      - victoriatraces

networks:
  warp-network:
    name: warp-network
    driver: bridge

volumes:
  victoriametrics-data:
  victorialogs-data:
  victoriatraces-data:
  grafana-data:
